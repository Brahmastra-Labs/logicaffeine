name: Deploy Frontend

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Dioxus App to Cloudflare Pages
    # Only deploy if tests passed and this was a push (not PR)
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # dx is installed from our dioxus fork at the pinned rev, not crates.io: the
      # wasm-split fixes live in the fork's splitter (wasm-split-cli), and the app
      # crates are pinned to the same rev via [patch.crates-io] in Cargo.toml.
      # Unpin both once the fixes land in a released dioxus.
      - name: Install Dioxus CLI (from fork)
        run: cargo install --git https://github.com/Brahmastra-Labs/dioxus --rev fde227fac7f9974fc61a3d126053b462a122136f dioxus-cli --locked || true

      # The wasm app fetches its heavy data (benchmark results/sources, legal HTML,
      # lexicon) from /data/* at runtime instead of compiling it in. Stage + validate
      # that bundle from the repo's sources of truth; a missing/empty file fails here.
      - name: Stage runtime data
        run: ./scripts/stage-web-data.sh

      # --ssg --fullstack: dx builds the wasm client (features=web) AND the native
      # prerender server (features=server), spawns the server, and writes per-route
      # static HTML from /api/static_routes into public/ — crawlers, AI bots, and
      # link unfurlers get real pages; the wasm client CSR-takes-over for users.
      # target/dx is derived state restored by the cargo cache; dx's .captured-args
      # snapshot inside it can pin a STALE Dioxus.toml (observed: old [web.app]
      # title substituted into the shell). Drop it — recapture is cheap, the real
      # cargo caches are untouched.
      # wasm-split is DISABLED: the fork's splitter miscompiles the DOM-edit stream
      # for most routes (the interpreter boots into `reading 'listening'` on an
      # undefined node), so `/`, `/pricing`, `/news`, `/roadmap`, `/guide` all
      # render blank in production — only `/studio` survived. Without splitting,
      # every route renders correctly; the tradeoff is a ~12 MB eager bundle
      # (~3-4 MB brotli) instead of the ~1.1 MB split entry. The per-route render
      # lock (test-ssg-render) gates this so a blank route can never ship again.
      # Re-add `--wasm-split --features split` once the fork's wasm-split-cli is
      # fixed and the render lock stays green with it on.
      - name: Build Dioxus App (SSG)
        run: |
          rm -rf target/dx
          dx build -p logicaffeine-web --release --ssg --fullstack

      # The prerender writes into web/prerendered (the client build rewrites
      # public/index.html after the prerender pass — see merge-ssg.sh).
      - name: Merge prerendered pages
        run: ./scripts/merge-ssg.sh

      # Emit public/chunks.json = the content-hashed lazy-chunk URLs the shell's
      # background-prefetch loop warms once the first page is idle, so later
      # navigation is instant instead of blocking on each page's wasm download.
      - name: Generate prefetch manifest
        run: ./scripts/gen-prefetch-manifest.sh

      # Fail the deploy if the bundle outgrows the budget — locks in libp2p staying out of
      # the default build (and any future bloat).
      - name: WASM size gate
        run: ./scripts/wasm-size-gate.sh

      # dx silently skips routes whose prerender fails — prove every sitemap route
      # produced its HTML with per-page canonical/OG/JSON-LD head intact.
      - name: Verify prerendered routes
        run: ./scripts/verify-ssg.sh

      # Render lock: prove EVERY route renders the LIVE app after wasm boot,
      # WITHOUT pumping the event loop — the gate the blank-homepage regression
      # (wasm-split miscompiling the DOM-edit stream) slipped past, because the
      # screenshot test below waits with waitForFunction, which keeps the loop
      # serviced and hides a stalled/crashed render.
      - name: Render lock (no blank/crashed routes)
        run: |
          npm install --no-save puppeteer-core@23
          CHROME_BIN="$(command -v google-chrome || command -v chromium-browser)" ./scripts/test-ssg-render.sh

      # Headless-browser boot: prerendered page CSR takeover (no duplicated DOM)
      # and an SPA-fallback route still boots the app.
      - name: SSG smoke test
        run: ./scripts/test-ssg-smoke.sh

      # Screenshot tests: EVERY sitemap route rendered in headless Chrome after
      # wasm boot — content markers, completed takeover, zero page errors, and a
      # pixel-level blank-viewport detector. Screenshots upload as an artifact.
      - name: Screenshot tests
        run: |
          npm install --no-save puppeteer-core@23
          CHROME_BIN="$(command -v google-chrome || command -v chromium-browser)" ./scripts/test-ssg-screenshots.sh
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: page-screenshots
          path: /tmp/ssg-shots/
          retention-days: 14

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying to Cloudflare Pages..."
          wrangler pages deploy target/dx/logicaffeine-web/release/web/public --project-name=logicaffeine --branch=main --commit-dirty=true
