name: Publish to crates.io

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

jobs:
  publish:
    runs-on: ubuntu-latest-m
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # The publish set and its dependency order are derived from cargo metadata,
      # so a new workspace member (or a new internal dependency edge) can never
      # silently fall out of sync with a hand-maintained list. Members with
      # `publish = false` are excluded automatically.
      #
      # Each crate is published with an explicit exit-status check — a failure
      # stops the job loudly. The one tolerated failure is "already uploaded",
      # which makes re-runs safe after a partial publish. No sleeps are needed:
      # cargo blocks until each published crate is live in the index.
      - name: Publish workspace crates in dependency order
        shell: bash
        run: |
          set -euo pipefail

          ORDER=$(cargo metadata --format-version 1 --no-deps | python3 -c '
          import json, sys

          meta = json.load(sys.stdin)
          packages = {p["name"]: p for p in meta["packages"]}
          publishable = {n: p for n, p in packages.items() if p["publish"] is None}
          deps = {
              n: sorted({d["name"] for d in p["dependencies"]
                         if d["name"] in publishable and d["kind"] is None})
              for n, p in publishable.items()
          }

          order, seen = [], set()
          def visit(name):
              if name in seen:
                  return
              seen.add(name)
              for dep in deps[name]:
                  visit(dep)
              order.append(name)

          for name in sorted(publishable):
              visit(name)
          print("\n".join(order))
          ')

          echo "Publish order:"
          echo "$ORDER"

          # Retry only the ONE transient class that can occur in a correct
          # in-order publish: a just-published dependency has not yet propagated
          # into the sparse index when the next crate uploads. cargo already
          # blocks on that after each publish, but its wait can time out under
          # index lag — so on a version-resolution error we back off and retry
          # rather than dying and forcing a manual (safe) re-run. Every other
          # failure is a real error and still stops the job loudly; an
          # already-uploaded crate is skipped so re-runs stay idempotent.
          for crate in $ORDER; do
            echo "::group::Publish $crate"
            attempt=1
            max_attempts=5
            while :; do
              set +e
              cargo publish -p "$crate" --no-verify 2>&1 | tee /tmp/pub.log
              status="${PIPESTATUS[0]}"
              set -e
              if [ "$status" -eq 0 ]; then
                echo "$crate published"
                break
              elif grep -qi 'already uploaded\|already exists' /tmp/pub.log; then
                echo "$crate already published at this version — skipping"
                break
              elif grep -qiE 'failed to select a version|no matching package|not yet (available|in the index)|unable to get packages from source' /tmp/pub.log \
                   && [ "$attempt" -lt "$max_attempts" ]; then
                echo "::warning::$crate: a dependency is not yet visible in the index (attempt $attempt/$max_attempts) — waiting 30s for propagation"
                attempt=$((attempt + 1))
                sleep 30
                continue
              else
                echo "::error::cargo publish failed for $crate (exit $status)"
                exit 1
              fi
            done
            echo "::endgroup::"
          done
