name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-lsp:
    name: Build LSP (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: logicaffeine-lsp
            artifact: logicaffeine-lsp-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: logicaffeine-lsp
            artifact: logicaffeine-lsp-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: logicaffeine-lsp
            artifact: logicaffeine-lsp-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: logicaffeine-lsp
            artifact: logicaffeine-lsp-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: logicaffeine-lsp.exe
            artifact: logicaffeine-lsp-win32-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build LSP binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build -p logicaffeine-lsp --release --target ${{ matrix.target }}

      - name: Upload LSP binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  # The CLI (`largo`) for every platform, in two flavors: lean (default) and
  # full (`verification-static`: Z3 4.12.x built from the source vendored in
  # z3-sys and statically linked — needs cmake + a C++ toolchain + libclang
  # for bindgen). Linux builds pin ubuntu-22.04 for the glibc 2.35 floor
  # (ubuntu-latest = 24.04 would require glibc 2.39 and lock out Debian 12 /
  # Ubuntu 22.04 / RHEL 9); arm64 builds run on native ARM runners so no C++
  # cross-compilation happens anywhere in this matrix.
  build-cli:
    name: Build largo (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-22.04,     flavor: lean, artifact: largo-linux-x64,        bin: largo }
          - { target: x86_64-unknown-linux-gnu,  os: ubuntu-22.04,     flavor: full, artifact: largo-full-linux-x64,   bin: largo }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04-arm, flavor: lean, artifact: largo-linux-arm64,      bin: largo }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-22.04-arm, flavor: full, artifact: largo-full-linux-arm64, bin: largo }
          - { target: x86_64-apple-darwin,       os: macos-latest,     flavor: lean, artifact: largo-darwin-x64,       bin: largo }
          - { target: x86_64-apple-darwin,       os: macos-latest,     flavor: full, artifact: largo-full-darwin-x64,  bin: largo }
          - { target: aarch64-apple-darwin,      os: macos-latest,     flavor: lean, artifact: largo-darwin-arm64,     bin: largo }
          - { target: aarch64-apple-darwin,      os: macos-latest,     flavor: full, artifact: largo-full-darwin-arm64, bin: largo }
          - { target: x86_64-pc-windows-msvc,    os: windows-latest,   flavor: lean, artifact: largo-win32-x64,        bin: largo.exe }
          - { target: x86_64-pc-windows-msvc,    os: windows-latest,   flavor: full, artifact: largo-full-win32-x64,   bin: largo.exe }

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # The full flavor builds Z3 from the source vendored in z3-sys via
      # cmake, and z3-sys's build.rs runs bindgen (runtime libclang loading).
      # Install explicitly — never depend on a runner preinstall.
      - name: Install Z3 static-build toolchain (Linux, full)
        if: matrix.flavor == 'full' && runner.os == 'Linux'
        run: |
          # Z3 4.16's C++ uses std::format (C++20), which needs gcc >= 13 —
          # ubuntu-22.04 ships gcc-11, so pull gcc-13 from the toolchain PPA.
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get update
          sudo apt-get install -y cmake gcc-13 g++-13 libclang-dev
      # macOS: cmake + Apple clang + libclang ship on the runner image.
      # Windows: cmake + MSVC + LLVM (libclang) ship on the runner image.

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          # flavor in the key: the full build's target/ holds the ~30-min
          # libz3.a; arch in the key: linux x64/arm64 share runner.os.
          key: ${{ runner.os }}-${{ runner.arch }}-largo-${{ matrix.flavor }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build largo (lean)
        if: matrix.flavor == 'lean'
        shell: bash
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.target == 'x86_64-apple-darwin' && '10.15' || '11.0' }}
          # Self-contained on Windows: no vcruntime140.dll prerequisite.
          RUSTFLAGS: ${{ runner.os == 'Windows' && '-C target-feature=+crt-static' || '' }}
        run: cargo build -p logicaffeine-cli --release --target ${{ matrix.target }}

      - name: Build largo (full, Z3 static)
        if: matrix.flavor == 'full'
        shell: bash
        env:
          # Z3 4.16's C++ uses std::format/std::to_chars; libc++ only ships those
          # from macOS 13.3, so the Z3-static (full) darwin binaries take a 13.3
          # deployment floor (the lean binaries keep the low 10.15/11.0 floor).
          MACOSX_DEPLOYMENT_TARGET: ${{ contains(matrix.target, 'apple') && '13.3' || '11.0' }}
          # z3-sys vendors a Z3 whose CMakeLists still declares cmake_minimum_required
          # < 3.5; CMake 4 removed that compatibility ("Or, add
          # -DCMAKE_POLICY_VERSION_MINIMUM=3.5"), so pin the policy floor via the
          # environment the cmake crate forwards.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
          # No crt-static here: the cmake-built libz3 must agree with Rust's
          # CRT choice; full-windows ships /MD until a dispatch run proves /MT.
        run: |
          # Z3 4.16 needs a C++20 std::format-capable compiler; on Linux use the
          # gcc-13 installed above (ubuntu-22.04's default gcc-11 lacks it).
          if [ "$(uname)" = "Linux" ]; then
            export CC=gcc-13 CXX=g++-13
            # gcc-13's libstdc++ tags symbols GLIBCXX_3.4.31, which stock ubuntu-22.04
            # (and older) don't ship — a dynamically-linked full binary then dies at
            # startup with "GLIBCXX_3.4.31 not found". Statically bundle libstdc++ so
            # the binary self-contains its C++ runtime and runs on any glibc. A search
            # dir holding ONLY libstdc++.a makes the linker's -lstdc++ (emitted by
            # z3-sys) resolve to the static archive instead of the .so.
            STDCPP_DIR="${RUNNER_TEMP:-/tmp}/staticstdcpp"
            mkdir -p "$STDCPP_DIR"
            ln -sf "$(g++-13 -print-file-name=libstdc++.a)" "$STDCPP_DIR/libstdc++.a"
            export RUSTFLAGS="-L $STDCPP_DIR -C link-arg=-static-libgcc"
          fi
          cargo build -p logicaffeine-cli --release --target ${{ matrix.target }} --features verification-static

      - name: Assert no dynamic libz3 / libstdc++ (full, unix)
        if: matrix.flavor == 'full' && runner.os != 'Windows'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/largo
          if [ "$(uname)" = "Darwin" ]; then
            if otool -L "$BIN" | grep -qi libz3; then echo "dynamic libz3 leaked in"; exit 1; fi
          else
            if ldd "$BIN" | grep -qi libz3; then echo "dynamic libz3 leaked in"; exit 1; fi
            # The full binary MUST statically bundle libstdc++: gcc-13 tags symbols
            # GLIBCXX_3.4.31, which stock ubuntu-22.04 (and older) don't ship, so a
            # dynamic libstdc++ dependency crashes at startup ("GLIBCXX_3.4.31 not
            # found"). A leaked dynamic libstdc++ here is exactly the v0.10.0 bug.
            if readelf -d "$BIN" | grep -qiE 'NEEDED.*libstdc\+\+'; then
              echo "dynamic libstdc++ leaked in — would fail on stock glibc (GLIBCXX_3.4.31 not found)"; exit 1
            fi
          fi

      # darwin-x64 is cross-compiled on arm64 runners — no smoke run there
      # (Rosetta availability varies); every other target runs natively.
      - name: Smoke-run
        if: matrix.target != 'x86_64-apple-darwin'
        shell: bash
        run: target/${{ matrix.target }}/release/${{ matrix.bin }} --version

      # Package INSIDE the build job: actions/upload-artifact@v4 drops the
      # executable bit, so tarring after download would ship non-executable
      # binaries.
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/stage
          cp target/${{ matrix.target }}/release/largo dist/stage/
          cp LICENSE.md dist/stage/
          printf '%s\n' \
            "largo — the LOGOS build tool" \
            "https://logicaffeine.com" \
            "Install: curl -fsSL https://logicaffeine.com/install.sh | sh" \
            > dist/stage/README.txt
          chmod +x dist/stage/largo
          tar -czf dist/${{ matrix.artifact }}.tar.gz -C dist/stage .

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/stage | Out-Null
          Copy-Item target/${{ matrix.target }}/release/largo.exe dist/stage/
          Copy-Item LICENSE.md dist/stage/
          Set-Content dist/stage/README.txt "largo - the LOGOS build tool`nhttps://logicaffeine.com`nInstall: irm https://logicaffeine.com/install.ps1 | iex"
          Compress-Archive -Path dist/stage/* -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Upload largo artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*

  # One VSIX per platform, each carrying exactly ONE server binary (~a few
  # MB instead of all five), plus a binary-free universal VSIX the
  # Marketplace serves to platforms without a targeted build (it resolves
  # the server via the lsp.path setting or PATH).
  package-vscode:
    name: Package VSIX (${{ matrix.target }})
    needs: build-lsp
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-x64,    artifact: logicaffeine-lsp-linux-x64,    file: logicaffeine-lsp,     staged: logicaffeine-lsp-linux-x64 }
          - { target: linux-arm64,  artifact: logicaffeine-lsp-linux-arm64,  file: logicaffeine-lsp,     staged: logicaffeine-lsp-linux-arm64 }
          - { target: darwin-x64,   artifact: logicaffeine-lsp-darwin-x64,   file: logicaffeine-lsp,     staged: logicaffeine-lsp-darwin-x64 }
          - { target: darwin-arm64, artifact: logicaffeine-lsp-darwin-arm64, file: logicaffeine-lsp,     staged: logicaffeine-lsp-darwin-arm64 }
          - { target: win32-x64,    artifact: logicaffeine-lsp-win32-x64,    file: logicaffeine-lsp.exe, staged: logicaffeine-lsp-win32-x64.exe }
          - { target: universal,    artifact: "",                            file: "",                   staged: "" }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download LSP binary
        if: matrix.artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: lsp-binary

      - name: Prepare extension directory
        working-directory: editors/vscode/logicaffeine
        run: |
          npm ci
          mkdir -p bin

      - name: Stage LSP binary
        if: matrix.artifact != ''
        working-directory: editors/vscode/logicaffeine
        run: |
          cp "../../../lsp-binary/${{ matrix.file }}" "bin/${{ matrix.staged }}"
          chmod +x "bin/${{ matrix.staged }}"

      # `vsce package` runs vscode:prepublish, which esbuild-bundles the
      # extension into dist/ — --no-dependencies is correct because the bundle
      # is self-contained (tests/unit/vsix_contents.test.ts locks this).
      - name: Package VSIX
        working-directory: editors/vscode/logicaffeine
        run: |
          TARGET_FLAG=""
          if [ "${{ matrix.target }}" != "universal" ]; then
            TARGET_FLAG="--target ${{ matrix.target }}"
          fi
          npx vsce package --no-dependencies $TARGET_FLAG -o "logicaffeine-${{ matrix.target }}.vsix"

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: editors/vscode/logicaffeine/logicaffeine-${{ matrix.target }}.vsix

  # The honest pre-publish gate: install the ACTUAL packaged VSIX into a real
  # VSCode on each OS and run the integration suite against it — bundled
  # server included. This is the job that catches "the published extension
  # cannot activate" before anything publishes.
  e2e-vsix:
    name: VSIX install gate (${{ matrix.target }})
    needs: package-vscode
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: linux-x64 }
          - { os: macos-latest,   target: darwin-arm64 }
          - { os: windows-latest, target: win32-x64 }
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vsix-${{ matrix.target }}
          path: vsix

      - name: Install extension dependencies
        working-directory: editors/vscode/logicaffeine
        run: npm ci

      - name: Run install gate (Linux, under xvfb)
        if: runner.os == 'Linux'
        working-directory: editors/vscode/logicaffeine
        env:
          VSIX_PATH: ${{ github.workspace }}/vsix/logicaffeine-${{ matrix.target }}.vsix
        run: xvfb-run -a npm run test:vsix-gate

      - name: Run install gate
        if: runner.os != 'Linux'
        working-directory: editors/vscode/logicaffeine
        env:
          VSIX_PATH: ${{ github.workspace }}/vsix/logicaffeine-${{ matrix.target }}.vsix
        run: npm run test:vsix-gate

  # MARKETPLACE PUBLISH — DELIBERATELY DISABLED for 0.10.0 (owner's call: VSIXs ship as
  # GitHub-release artifacts only for now). Re-enable by uncommenting this job; the
  # packaging, install gate, and release attachment above/below are unaffected.
  ## Fail-loud marketplace publishing (mirrors publish.yml's philosophy):
  ## missing secrets ABORT the job — never a silent skip — and the only
  ## tolerated failure is "this exact version already exists" (re-run safe).
