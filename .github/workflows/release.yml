  github-release:
    name: Create GitHub Release
    needs: [build-lsp, package-vscode, e2e-vsix, build-cli]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir release
          cd artifacts
          # upload-artifact drops the exec bit — restore it before tarring
          # the LSP binaries (the largo tarballs were packaged in-job and
          # already carry it).
          chmod +x logicaffeine-lsp-*/logicaffeine-lsp* || true
          for dir in logicaffeine-lsp-*; do
            tar -czf "../release/${dir}.tar.gz" -C "$dir" .
          done
          cp largo-*/largo-*.tar.gz ../release/ 2>/dev/null || true
          cp largo-*/largo-*.zip    ../release/ 2>/dev/null || true
          cp vsix-*/logicaffeine-*.vsix ../release/
          cd ../release && sha256sum -- * > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*

  # The honest post-publish gate: install the just-published release with
  # the real installers, pinned to this tag, and check `largo --version`.
  e2e-install:
    name: e2e install (${{ matrix.name }})
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-lean,  os: ubuntu-22.04,     args: "" }
          - { name: linux-arm-full, os: ubuntu-22.04-arm, args: "--full" }
          - { name: macos-lean,  os: macos-latest,     args: "" }
    steps:
      - uses: actions/checkout@v4
      - name: Install via install.sh (pinned to this tag)
        run: |
          sh apps/logicaffeine_web/public/install.sh --version "${GITHUB_REF_NAME}" ${{ matrix.args }}
          "$HOME/.local/bin/largo" --version
          VERSION_OUT="$("$HOME/.local/bin/largo" --version)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          case "$VERSION_OUT" in
            *"$TAG_VERSION"*) echo "version matches: $VERSION_OUT" ;;
            *) echo "installed version '$VERSION_OUT' does not match tag '$TAG_VERSION'"; exit 1 ;;
          esac

  e2e-install-windows:
    name: e2e install (windows-ps1)
    needs: github-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install via install.ps1 (pinned to this tag)
        shell: pwsh
        run: |
          & ([scriptblock]::Create((Get-Content -Raw apps/logicaffeine_web/public/install.ps1))) -Version $env:GITHUB_REF_NAME
          $out = & (Join-Path $env:LOCALAPPDATA "Programs\largo\largo.exe") --version
          $tagVersion = $env:GITHUB_REF_NAME.TrimStart('v')
          if ($out -notmatch [regex]::Escape($tagVersion)) {
            throw "installed version '$out' does not match tag '$tagVersion'"
          }
          Write-Host "version matches: $out"
