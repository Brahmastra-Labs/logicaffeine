name: Forge JIT

on:
  push:
    branches: [main]
    paths:
      - 'crates/logicaffeine_forge/**'
      - 'crates/logicaffeine_tests/tests/jit_*.rs'
      - '.github/workflows/forge.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/logicaffeine_forge/**'
      - 'crates/logicaffeine_tests/tests/jit_*.rs'
      - '.github/workflows/forge.yml'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Runtime tests: the copy-and-patch JIT mmaps executable pages and runs
  # real machine code. The stencil chain relies on rustc's x86_64 System V
  # tail-call codegen; Windows (MS ABI) and aarch64 emit a plain `call` at
  # continuation sites, so those targets run the bytecode VM (forge/jit compile
  # to nothing there — proven by the cross-check job below). The runtime tests
  # therefore cover the two SysV hosts where the JIT actually executes:
  #   ubuntu x64  — mprotect, ELF stencils, x64 rel32 patching
  #   macos x64   — mmap/mprotect, Mach-O stencils, literal-pool const holes
  runtime:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-13]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ runner.arch }}-forge-${{ hashFiles('**/Cargo.lock') }}

      - name: Run forge unit tests
        run: cargo test -p logicaffeine-forge --verbose

      # The JIT integration suites live in the tests crate (all integration
      # tests do). They need no Z3 — the verification feature stays off.
      - name: Run JIT integration tests
        run: cargo test -p logicaffeine-tests --test jit_micro --test jit_exec --test jit_control_flow --test jit_bisect --test jit_vm_differential

  # Cross-compilation gates: stencil extraction happens at build time via
  # `rustc --emit=obj` (no linker needed), so one host can verify codegen,
  # object-format parsing (ELF/COFF/Mach-O), the reloc whitelist, and the
  # tail-call + leaf-purity gates for every supported target.
  cross-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
          - x86_64-pc-windows-gnu
          - wasm32-unknown-unknown
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: cross-${{ matrix.target }}-forge-${{ hashFiles('**/Cargo.lock') }}

      - name: Check forge for target
        run: cargo check -p logicaffeine-forge --target ${{ matrix.target }} --verbose
