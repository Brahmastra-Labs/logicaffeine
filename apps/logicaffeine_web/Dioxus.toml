[application]
name = "logos"
default_platform = "web"
asset_dir = "assets"

[web.app]
title = "LOGICAFFEINE | Debug Your Thoughts"

# Pin binaryen's post-link optimizer to the size-first level (dx's release default —
# pinned so an upstream default change can't silently regrow the bundle).
[web.wasm_opt]
level = "z"
debug = false

[web.resource]
dev = []
style = []

[web.watcher]
index_on_404 = true
