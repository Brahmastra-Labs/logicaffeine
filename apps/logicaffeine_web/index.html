<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{app_title}</title>

    <!-- Site-wide invariants only. Per-page tags (title/description, Open Graph,
         Twitter card URL/text, canonical) are emitted into each prerendered page
         by PageHead during the SSG build, and created/patched live by the wasm
         client — duplicating them here would give unfurlers two competing sets. -->
    <meta name="keywords" content="logic, first-order logic, FOL, formal logic, reasoning, English to logic, transpiler, formal methods">
    <meta name="author" content="LOGICAFFEINE">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@logicaffeine">
    <meta name="twitter:creator" content="@logicaffeine">
    <link rel="icon" type="image/png" href="/site-icon.png">

    <!-- Consolidated stylesheet -->
    <link rel="stylesheet" href="/assets/style.css">

    <script>
        // KaTeX loads on demand: the first render call pulls the script + stylesheet
        // from the CDN and queues renders behind the load, so pages without math
        // never pay for it and no render is ever dropped while the CDN is slow.
        (function () {
            let katexReady = null;
            function ensureKatex() {
                if (!katexReady) {
                    const css = document.createElement('link');
                    css.rel = 'stylesheet';
                    css.href = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css';
                    document.head.appendChild(css);
                    katexReady = new Promise((resolve) => {
                        const s = document.createElement('script');
                        s.src = 'https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js';
                        s.onload = () => resolve();
                        s.onerror = () => { katexReady = null; resolve(); };
                        document.head.appendChild(s);
                    });
                }
                return katexReady;
            }
            window.renderKaTeX = function (elementId, latex, displayMode) {
                ensureKatex().then(() => {
                    const el = document.getElementById(elementId);
                    if (!el) return;
                    if (window.katex) {
                        try {
                            katex.render(latex, el, {
                                displayMode: displayMode,
                                throwOnError: false
                            });
                        } catch (e) {
                            el.textContent = latex;
                        }
                    } else {
                        el.textContent = latex;
                    }
                });
            };
        })();

        // Audio feedback system
        const audioCache = {};
        window.playSound = function(effect) {
            const sounds = {
                'xp_gain': 'assets/sounds/xp.mp3',
                'critical': 'assets/sounds/crit.mp3',
                'combo_up': 'assets/sounds/combo.mp3',
                'combo_break': 'assets/sounds/break.mp3',
                'achievement': 'assets/sounds/achievement.mp3',
                'level_up': 'assets/sounds/levelup.mp3',
                'streak_saved': 'assets/sounds/shield.mp3',
                'streak_lost': 'assets/sounds/lost.mp3',
                'correct': 'assets/sounds/correct.mp3',
                'incorrect': 'assets/sounds/incorrect.mp3'
            };
            const path = sounds[effect];
            if (!path) return;
            try {
                if (!audioCache[effect]) {
                    audioCache[effect] = new Audio(path);
                    audioCache[effect].volume = 0.5;
                }
                audioCache[effect].currentTime = 0;
                audioCache[effect].play().catch(() => {});
            } catch (e) {}
        };
    </script>

    <style>
        /* Syntax highlighting classes for tokens */
        .tok-quantifier { color: #c678dd; font-weight: bold; }
        .tok-noun { color: #61afef; }
        .tok-verb { color: #98c379; }
        .tok-adjective { color: #e5c07b; }
        .tok-connective { color: #c678dd; }
        .tok-determiner { color: #56b6c2; }
        .tok-preposition { color: #abb2bf; }
        .tok-pronoun { color: #61afef; font-style: italic; }
        .tok-modal { color: #e06c75; }
        .tok-punctuation { color: #abb2bf; }

    </style>

    <script>
        // CSR takeover as a maintained INVARIANT, not a one-shot swap: the user
        // always sees either the live app (#app) or the prerendered copy (#main),
        // never a blank frame. A rAF watchdog keeps #main hidden only while
        // #app-root is genuinely live (a child element AND real text); if the app
        // ever goes empty — a boot crash, a failed lazy chunk, any render
        // regression — it RESTORES #main so the static prerendered page (readable,
        // nav links work) shows instead of a blank screen. #main is only removed
        // after the app has been durably live; if that never happens we leave the
        // prerendered copy up. Because it is rAF-driven it also cures the
        // "blank until you tab back" case: rAF is throttled while hidden and
        // resumes on foreground, re-asserting the invariant the moment you return.
        (function () {
            var MIN = 24, STABLE_MS = 1500, GIVE_UP_MS = 20000;
            function live() {
                var r = document.getElementById('app-root');
                return !!(r && r.firstElementChild && (r.innerText || '').trim().length >= MIN);
            }
            var stableSince = 0, t0 = 0, removed = false;
            function tick(now) {
                var main = document.getElementById('main');
                if (removed || !main) return;
                if (!t0) t0 = now;
                if (live()) {
                    main.style.display = 'none';
                    if (!stableSince) stableSince = now;
                    if (now - stableSince > STABLE_MS) { main.remove(); removed = true; return; }
                } else {
                    main.style.display = '';
                    stableSince = 0;
                }
                if (now - t0 > GIVE_UP_MS) { main.style.display = ''; return; }
                requestAnimationFrame(tick);
            }
            function start() { if (document.getElementById('main')) requestAnimationFrame(tick); }
            if (document.readyState === 'loading') addEventListener('DOMContentLoaded', start);
            else start();
        })();

        // Background chunk prefetch: the site code-splits each route body into
        // its own wasm blob, so the FIRST visit to every other page would block
        // on downloading that chunk. Once the first page is idle we quietly warm
        // ALL of them — network + compile in one primitive — so later navigation
        // is instant. `chunks.json` (its content-hashed URLs) is written at build
        // time by scripts/gen-prefetch-manifest.sh; if it's absent (dev, no split)
        // or the connection is constrained, this is a no-op.
        (function () {
            if (window.__wasmPrefetchStarted) return;
            window.__wasmPrefetchStarted = true;

            var conn = navigator.connection || {};
            // Data-saver or a slow link: don't spend the visitor's bytes eagerly.
            if (conn.saveData) return;
            var et = conn.effectiveType || '';
            if (et === '2g' || et === 'slow-2g') return;
            // Compiling every chunk is real CPU work (the engine is duplicated
            // across them); on low-core devices warm the network only.
            var compile = (navigator.hardwareConcurrency || 8) >= 4
                && typeof WebAssembly !== 'undefined'
                && typeof WebAssembly.compileStreaming === 'function';

            function warm(url) {
                var opts = { priority: 'low' };
                if (compile) {
                    return WebAssembly.compileStreaming(fetch(url, opts)).then(
                        function () {},
                        function () { return fetch(url, opts).then(function () {}, function () {}); }
                    );
                }
                return fetch(url, opts).then(function () {}, function () {});
            }

            function run() {
                fetch('/chunks.json', { priority: 'low' })
                    .then(function (r) { return r.ok ? r.json() : []; })
                    .then(function (chunks) {
                        if (!Array.isArray(chunks) || chunks.length === 0) return;
                        // Small-first (the manifest is pre-sorted), concurrency-capped
                        // drip so we never contend with the page the user asked for.
                        var i = 0;
                        function next() {
                            if (i >= chunks.length) return;
                            var c = chunks[i++];
                            (c && c.url ? warm(c.url) : Promise.resolve()).then(next);
                        }
                        next();
                        next();
                    })
                    .catch(function () {});
            }

            function schedule() {
                if ('requestIdleCallback' in window) requestIdleCallback(run, { timeout: 5000 });
                else setTimeout(run, 2000);
            }

            if (document.readyState === 'complete') schedule();
            else addEventListener('load', schedule);
        })();
    </script>
</head>
<body>
    <div id="app"></div>
    <div id="main"></div>
</body>
</html>
