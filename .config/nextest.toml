# AOT-native tier tests (HOTSWAP §Axis-3) each shell out to `rustc`/`cargo` to build a
# cdylib / wasm module / binary, recompiling the shared runtime crates in a PRIVATE temp
# target. Running several at once (they're all `#[ignore]`'d and only run under
# `--run-ignored`) storms the box — CPU plus ext4 dir-htree pressure from millions of
# `.dwo` files — and a build can transiently FAIL under that contention, panicking on
# `.expect("cdylib builds")`. The code is correct (each passes in isolation), so serialize
# the group (max-threads = 1) and retry a transient build failure, instead of letting the
# full suite flake on a self-inflicted build storm.
[test-groups.aot-cdylib]
max-threads = 1

[[profile.default.overrides]]
filter = 'binary(/^(aot_native_tier|aot_native_corpus|hotswap_p14_slice|hotswap_p15_aot_load|hotswap_p16_bundle|hotswap_p16_cache|hotswap_p17_wasm|hotswap_p18_bg_aot)$/)'
test-group = 'aot-cdylib'
retries = 2

[[profile.full.overrides]]
filter = 'binary(/^(aot_native_tier|aot_native_corpus|hotswap_p14_slice|hotswap_p15_aot_load|hotswap_p16_bundle|hotswap_p16_cache|hotswap_p17_wasm|hotswap_p18_bg_aot)$/)'
test-group = 'aot-cdylib'
retries = 2
